<!DOCTYPE html>
<html lang="en" data-ga-purchase="1">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful - IRS Audit Defense Pro</title>
  <meta name="supabase-url" content="%%SUPABASE_URL%%">
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%">
  <meta name="ga-measurement-id" content="" />
  <script src="/src/analytics.js" defer></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      flex: 1;
      width: min(600px, 92%);
      margin: 4rem auto;
      text-align: center;
    }
    .success-box {
      background: #1e293b;
      border: 2px solid #22c55e;
      border-radius: 12px;
      padding: 3rem;
    }
    .checkmark {
      font-size: 4rem;
      color: #22c55e;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 1rem;
      line-height: 1.8;
    }
    .cta-button {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      padding: 16px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 2rem;
      transition: all 0.3s;
    }
    .cta-button:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-box">
      <div class="checkmark">✓</div>
      <h1>Payment Successful</h1>
      <p>Your payment has been processed. Create your account to access the wizard.</p>
      <a href="/pricing" class="cta-button" id="primaryCta">Continue</a>
      <p style="margin-top: 2rem; font-size: 0.9rem; color: #94a3b8;">
        A receipt has been sent to your email address.
      </p>
    </div>
  </div>

  <script type="module">
    const p = new URLSearchParams(window.location.search);
    const sid = p.get('session_id');
    if (sid) {
      window.location.replace('/register?session_id=' + encodeURIComponent(sid));
    } else {
      const a = document.getElementById('primaryCta');
      if (a) a.setAttribute('href', '/register');
    }
  </script>
</body>
</html>
