<!DOCTYPE html>
<html lang="en" data-ga-purchase="1">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful - IRS Audit Defense Pro</title>
  <meta name="supabase-url" content="%%SUPABASE_URL%%">
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%">
  <meta name="ga-measurement-id" content="" />
  <script src="/src/analytics.js" defer></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      flex: 1;
      width: min(600px, 92%);
      margin: 4rem auto;
      text-align: center;
    }
    .success-box {
      background: #1e293b;
      border: 2px solid #22c55e;
      border-radius: 12px;
      padding: 3rem;
    }
    .checkmark {
      font-size: 4rem;
      color: #22c55e;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #ffffff;
    }
    p {
      color: #cbd5e1;
      margin-bottom: 1rem;
      line-height: 1.8;
    }
    .cta-button {
      display: inline-block;
      background: #dc2626;
      color: #fff;
      padding: 16px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 2rem;
      transition: all 0.3s;
    }
    .cta-button:hover {
      background: #b91c1c;
    }
    .status-note { font-size: 0.9rem; color: #94a3b8; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="success-box">
      <div class="checkmark">✓</div>
      <h1>Payment Successful</h1>
      <p>Your payment of $49 has been processed successfully.</p>
      <p>You now have access to the full IRS Audit Defense wizard.</p>
      <p id="verifyLine" class="status-note" style="display:none;"></p>
      <p id="redirectMsg" class="status-note" style="margin-top:1rem;">
        Redirecting to your workspace in <span id="countdown">5</span> seconds…
      </p>

      <a href="/audit-defense.html" class="cta-button" id="primaryCta">Start My IRS Defense →</a>

      <p style="margin-top: 2rem; font-size: 0.9rem; color: #94a3b8;">
        A receipt has been sent to your email address.
      </p>
    </div>
  </div>

  <script type="module">
    async function getSession() {
      try {
        const url = document.querySelector('meta[name="supabase-url"]')?.content;
        const key = document.querySelector('meta[name="supabase-anon-key"]')?.content;
        if (!url || !key || url.includes('%%')) return null;
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm');
        const supabase = createClient(url, key);
        const { data } = await supabase.auth.getSession();
        return data?.session || null;
      } catch {
        return null;
      }
    }

    const verifyLine = document.getElementById('verifyLine');
    try {
      const session = await getSession();
      const email = session?.user?.email;
      if (email) {
        const res = await fetch('/.netlify/functions/verify-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json().catch(() => ({}));
        verifyLine.style.display = 'block';
        if (data.hasPaid) {
          verifyLine.textContent = 'Payment verified for your account.';
        } else {
          verifyLine.textContent =
            'If you just paid, your record may take a moment to sync. Sign in with the same email you used at checkout.';
        }
      }
    } catch (_) {
      /* non-blocking */
    }

    let sec = 5;
    const cd = document.getElementById('countdown');
    const t = setInterval(() => {
      sec -= 1;
      if (cd) cd.textContent = String(Math.max(0, sec));
      if (sec <= 0) clearInterval(t);
    }, 1000);

    setTimeout(() => {
      window.location.href = '/audit-defense.html';
    }, 5000);
  </script>
</body>
</html>
