<!-- Admin Login Modal - Include this snippet before </body> tag -->
<!-- Usage: Add admin link to footer, then include this file -->

<!-- Admin Login Modal -->
<div id="adminModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:32px; width:90%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <h3 style="margin:0 0 20px; color:#2d3748; font-size:1.5rem;">Admin Access</h3>
        <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
            <div style="margin-bottom:16px;">
                <label style="display:block; margin-bottom:6px; color:#4a5568; font-size:0.9rem;">Username</label>
                <input type="text" id="adminUsername" required style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:6px; font-size:1rem;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; margin-bottom:6px; color:#4a5568; font-size:0.9rem;">Password</label>
                <input type="password" id="adminPassword" required style="width:100%; padding:10px; border:1px solid #cbd5e0; border-radius:6px; font-size:1rem;">
            </div>
            <div id="adminError" style="display:none; color:#dc2626; margin-bottom:16px; font-size:0.9rem; padding:10px; background:#fee2e2; border-radius:6px;"></div>
            <div style="display:flex; gap:10px;">
                <button type="button" onclick="closeAdminLogin()" style="flex:1; padding:12px; background:#e5e7eb; color:#4a5568; border:none; border-radius:6px; cursor:pointer; font-size:1rem;">Cancel</button>
                <button type="submit" style="flex:1; padding:12px; background:#2563eb; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:1rem;">Login</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openAdminLogin(e) {
        e.preventDefault();
        const modal = document.getElementById('adminModal');
        modal.style.display = 'flex';
        document.getElementById('adminUsername').focus();
    }

    function closeAdminLogin() {
        const modal = document.getElementById('adminModal');
        modal.style.display = 'none';
        document.getElementById('adminLoginForm').reset();
        document.getElementById('adminError').style.display = 'none';
    }

    async function handleAdminLogin(e) {
        e.preventDefault();
        
        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('adminError');

        try {
            const response = await fetch('/.netlify/functions/admin-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (data.success) {
                sessionStorage.setItem('adminToken', data.token);
                sessionStorage.setItem('adminUser', username);
                window.location.href = '/admin-dashboard.html';
            } else {
                errorDiv.textContent = data.error || 'Invalid credentials';
                errorDiv.style.display = 'block';
            }
        } catch (error) {
            errorDiv.textContent = 'Login failed. Please try again.';
            errorDiv.style.display = 'block';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeAdminLogin();
    });

    document.getElementById('adminModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'adminModal') closeAdminLogin();
    });
</script>
