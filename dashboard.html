<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Dashboard | IRS Audit Defense Pro</title>
    <meta name="description" content="Access your IRS Audit Defense Pro dashboard.">
    <meta name="supabase-url" content="%%SUPABASE_URL%%">
    <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%">
    <link rel="canonical" href="https://irsauditresponseai.netlify.app/dashboard">
    <style>
        #letterModal[open] { display: flex; align-items: center; justify-content: center; }
        #letterModal::backdrop { background: rgba(15, 23, 42, 0.65); }
        #letterModal .inner {
            background: #fff; color: #1f2937; max-width: 900px; width: 92%; max-height: 85vh; overflow: auto;
            border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }
        #letterModal pre { white-space: pre-wrap; font-family: 'Courier New', ui-monospace, monospace; font-size: 0.82rem; line-height: 1.5; margin: 0; }
    </style>
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>IRS Audit Defense Pro</strong></div>
        <div>
            <a href="/app" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">App</a> |
            <a href="/audit-defense.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Wizard</a> |
            <a href="/pricing" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Pricing</a> |
            <a href="/login" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Login</a>
        </div>
    </nav>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <h1 style="color:#ffffff; font-size:2.5rem; margin-bottom:1rem;">Your letters</h1>
        <p style="color:#94a3b8; margin-bottom:1.5rem;">Letters you generate in the wizard appear here.</p>

        <div id="docList" style="display:flex; flex-direction:column; gap:1rem;">
            <p style="color:#94a3b8;">Loading…</p>
        </div>
    </div>

    <dialog id="letterModal" style="border:none; padding:0; background:transparent; max-width:100vw;">
        <div class="inner">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; gap:1rem;">
                <h2 id="letterModalTitle" style="margin:0; font-size:1.15rem; color:#0f172a;">Letter</h2>
                <button type="button" id="letterModalClose" style="background:#e2e8f0; border:none; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; font-weight:600;">Close</button>
            </div>
            <pre id="letterModalBody"></pre>
        </div>
    </dialog>

    <script type="module">
        import { getSupabase } from '/src/components/Auth.js';

        const docList = document.getElementById('docList');
        const letterModal = document.getElementById('letterModal');
        const letterModalBody = document.getElementById('letterModalBody');
        const letterModalTitle = document.getElementById('letterModalTitle');
        document.getElementById('letterModalClose').addEventListener('click', () => letterModal.close());

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatDate(iso) {
            if (!iso) return '—';
            try {
                return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });
            } catch {
                return iso;
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = getSupabase();
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '/pricing';
                return;
            }

            const { data: rows, error } = await supabase
                .from('documents')
                .select('*')
                .eq('user_id', session.user.id)
                .order('created_at', { ascending: false });

            if (error) {
                docList.innerHTML = '<p style="color:#fca5a5;">Could not load documents.</p>';
                return;
            }

            const letters = (rows || []).filter((r) => r.letter_html != null && String(r.letter_html).trim() !== '');

            if (letters.length === 0) {
                docList.innerHTML = `
                    <div style="background:#1e293b; border:1px solid #334155; border-radius:12px; padding:2rem; color:#e2e8f0;">
                        <p style="margin:0 0 1rem;">No documents yet. Complete the wizard to generate your first letter.</p>
                        <a href="/app" style="color:#93c5fd; font-weight:600;">Open the app →</a>
                    </div>`;
                return;
            }

            docList.innerHTML = letters.map((doc) => {
                const nt = doc.notice_type || 'Notice';
                const dt = formatDate(doc.created_at);
                const safeId = escapeHtml(doc.id);
                return `
                    <div style="background:#ffffff; color:#1f2937; border-radius:12px; padding:1.25rem 1.5rem; border:1px solid #e2e8f0; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:1rem;">
                        <div>
                            <div style="font-weight:700; font-size:1.05rem;">${escapeHtml(nt)}</div>
                            <div style="font-size:0.9rem; color:#64748b; margin-top:0.25rem;">${escapeHtml(dt)}</div>
                        </div>
                        <button type="button" class="view-letter-btn" data-id="${safeId}" style="background:#334155; color:#fff; border:none; padding:10px 18px; border-radius:8px; font-weight:600; cursor:pointer;">View Letter</button>
                    </div>`;
            }).join('');

            const byId = Object.fromEntries(letters.map((d) => [d.id, d]));

            docList.querySelectorAll('.view-letter-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-id');
                    const doc = byId[id];
                    if (!doc) return;
                    letterModalTitle.textContent = doc.notice_type || 'Letter';
                    letterModalBody.textContent = doc.letter_html || '';
                    letterModal.showModal();
                });
            });
        });
    </script>
</body>
</html>
