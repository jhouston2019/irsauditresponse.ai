<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create your account | IRS Audit Defense Pro</title>
  <meta name="description" content="Complete your IRS Audit Defense Pro account after checkout." />
  <meta name="supabase-url" content="%%SUPABASE_URL%%" />
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%" />
  <link rel="canonical" href="https://irsauditresponseai.netlify.app/register" />
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
  <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
    <div style="color: #f5f5f5;"><strong>IRS Audit Defense Pro</strong></div>
    <div>
      <a href="/pricing" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Pricing</a> |
      <a href="/login" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Log in</a>
    </div>
  </nav>

  <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
    <div id="verifyPanel" style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
      <p id="verifyMsg" style="text-align:center; margin:0;">Verifying your payment…</p>
    </div>

    <div id="formPanel" style="display:none; max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
      <h2 style="text-align:center; margin-bottom:0.5rem; color:#2d3748; font-size:1.8rem;">Create your account</h2>
      <p style="text-align:center; color:#64748b; margin-bottom:1.5rem; font-size:0.95rem;">Payment confirmed. Choose an email and password for your workspace.</p>
      <form id="registerForm">
        <div style="margin-bottom:1.25rem;">
          <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748; box-sizing:border-box;" />
        </div>
        <div style="margin-bottom:1.25rem;">
          <label for="password" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748; box-sizing:border-box;" />
        </div>
        <div style="margin-bottom:1.25rem;">
          <label for="password2" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Confirm password</label>
          <input type="password" id="password2" name="password2" required minlength="6" autocomplete="new-password" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748; box-sizing:border-box;" />
        </div>
        <button type="submit" style="background:#334155; color:white; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; width:100%;">Create account</button>
      </form>
      <p id="formErr" style="color:#b91c1c; margin-top:1rem; text-align:center; font-size:0.95rem; min-height:1.2em;"></p>
    </div>
  </div>

  <script type="module">
    import { getSupabase } from '/src/components/Auth.js';

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');
    const verifyPanel = document.getElementById('verifyPanel');
    const verifyMsg = document.getElementById('verifyMsg');
    const formPanel = document.getElementById('formPanel');
    const formErr = document.getElementById('formErr');

    function goPricing() {
      window.location.replace('/pricing');
    }

    if (!sessionId) {
      goPricing();
    } else {
      (async () => {
        try {
          const res = await fetch('/.netlify/functions/verify-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: sessionId }),
          });
          if (!res.ok) {
            goPricing();
            return;
          }
          verifyPanel.style.display = 'none';
          formPanel.style.display = 'block';
        } catch {
          goPricing();
        }
      })();
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      formErr.textContent = '';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password !== password2) {
        formErr.textContent = 'Passwords do not match.';
        return;
      }
      try {
        const supabase = getSupabase();
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          formErr.textContent = error.message;
          return;
        }
        const userId = data.user?.id;
        if (!userId) {
          formErr.textContent = 'Could not create user. Try again or log in if you already have an account.';
          return;
        }
        const rec = await fetch('/.netlify/functions/record-purchase', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId, user_id: userId }),
        });
        if (!rec.ok) {
          const j = await rec.json().catch(() => ({}));
          formErr.textContent = j.error || 'Could not record purchase. Contact support.';
          return;
        }
        window.location.href = '/app';
      } catch (err) {
        formErr.textContent = err.message || 'Something went wrong.';
      }
    });
  </script>
</body>
</html>
