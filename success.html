<!DOCTYPE html>
<html lang="en" data-ga-purchase="1">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirming payment… | IRS Audit Defense Pro</title>
  <meta name="supabase-url" content="%%SUPABASE_URL%%" />
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%" />
  <meta name="ga-measurement-id" content="" />
  <script src="/src/analytics.js" defer></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin-bottom: 0.75rem; color: #fff; }
    p { color: #94a3b8; font-size: 0.95rem; line-height: 1.6; margin-bottom: 0.75rem; }
    .err { color: #fca5a5; }
    #log { font-size: 0.8rem; color: #64748b; margin-top: 1rem; text-align: left; white-space: pre-wrap; }
    a.btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      background: #dc2626;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="headline">Confirming your payment</h1>
    <p id="sub">Please wait — we are unlocking your account.</p>
    <p id="errLine" class="err" style="display:none;"></p>
    <div id="log"></div>
    <a class="btn" href="/pricing" id="pricingLink" style="display:none;">Return to pricing</a>
  </div>

  <script type="module">
    const logEl = document.getElementById('log');
    const errLine = document.getElementById('errLine');
    const headline = document.getElementById('headline');
    const sub = document.getElementById('sub');
    const pricingLink = document.getElementById('pricingLink');

    function log(msg) {
      logEl.textContent += msg + '\n';
    }

    async function getSupabase() {
      const url = document.querySelector('meta[name="supabase-url"]')?.content;
      const key = document.querySelector('meta[name="supabase-anon-key"]')?.content;
      if (!url || !key || url.includes('%%')) {
        throw new Error('App configuration missing (Supabase).');
      }
      const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
      return createClient(url, key);
    }

    async function apiAuthMe(supabase) {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.access_token) return null;
      const r = await fetch('/api/auth/me', {
        headers: { Authorization: 'Bearer ' + session.access_token },
      });
      if (!r.ok) return null;
      return r.json();
    }

    async function postCreateSession(supabase, sessionId, refreshMagicLink) {
      const { data: { session } } = await supabase.auth.getSession();
      const headers = { 'Content-Type': 'application/json' };
      if (session?.access_token) {
        headers['Authorization'] = 'Bearer ' + session.access_token;
      }
      return fetch('/api/auth/create-session-from-stripe', {
        method: 'POST',
        headers,
        body: JSON.stringify({
          session_id: sessionId,
          ...(refreshMagicLink ? { refresh_magic_link: true } : {}),
        }),
      });
    }

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!sessionId) {
      headline.textContent = 'Missing checkout session';
      sub.textContent = 'Use the link from Stripe after payment, or return to pricing to try again.';
      pricingLink.style.display = 'inline-block';
      throw new Error('no_session_id');
    }

    try {
      const supabase = await getSupabase();

      let cre = await postCreateSession(supabase, sessionId, false);
      let creJson = await cre.json();

      if (cre.status === 403 && creJson.code === 'session_already_finalized') {
        const { data: { session: existing } } = await supabase.auth.getSession();
        if (existing) {
          creJson = { finalized: true };
          log('Session already finalized; using existing browser session.');
        } else {
          cre = await postCreateSession(supabase, sessionId, true);
          creJson = await cre.json();
          if (!cre.ok) {
            throw new Error(creJson.error || 'Could not refresh login');
          }
        }
      } else if (!cre.ok) {
        throw new Error(creJson.error || 'Finalize failed');
      }

      if (creJson.finalized && !creJson.hashed_token) {
        const { data: { session: existing } } = await supabase.auth.getSession();
        if (!existing) {
          cre = await postCreateSession(supabase, sessionId, true);
          creJson = await cre.json();
          if (!cre.ok) {
            throw new Error(creJson.error || 'Could not refresh login');
          }
        }
      }

      if (creJson.hashed_token && creJson.email) {
        const { error: otpErr } = await supabase.auth.verifyOtp({
          token_hash: creJson.hashed_token,
          type: 'email',
          email: creJson.email,
        });
        if (otpErr) {
          log('Magic link verify: ' + otpErr.message);
        }
      }

      let me = await apiAuthMe(supabase);
      if (!me?.authenticated || me.billing?.paid !== true) {
        headline.textContent = 'Could not start session';
        sub.textContent = 'Try signing in from the link we emailed, or use Recover.';
        errLine.style.display = 'block';
        errLine.textContent = 'Session not established or entitlement not active.';
        pricingLink.style.display = 'inline-block';
        throw new Error('no_auth');
      }
      log('Session OK for ' + (me.user?.email || ''));

      const { data: { session } } = await supabase.auth.getSession();
      const authHeader = session?.access_token ? { Authorization: 'Bearer ' + session.access_token } : {};

      let pending = true;
      for (let i = 0; i < 5; i++) {
        const vr = await fetch('/api/verify-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeader },
          body: JSON.stringify({ session_id: sessionId }),
        });
        const vj = await vr.json().catch(() => ({}));
        log('verify-payment attempt ' + (i + 1) + ': ' + JSON.stringify(vj));
        if (vj.success && !vj.pending) {
          pending = false;
          break;
        }
        await new Promise((r) => setTimeout(r, 1500));
      }

      me = await apiAuthMe(supabase);
      if (me?.billing?.paid !== true) {
        headline.textContent = 'Payment not fully verified';
        sub.textContent = 'Contact support with your receipt, or try Recover.';
        errLine.style.display = 'block';
        errLine.textContent = 'Entitlement not active.';
        pricingLink.style.display = 'inline-block';
        throw new Error('entitlement_inactive');
      }

      headline.textContent = pending ? 'Payment processing' : 'All set';
      sub.textContent = pending
        ? 'Sync finishing; continuing to the app.'
        : 'Redirecting to your workspace…';

      window.location.replace('/app');
    } catch (e) {
      if (e.message !== 'no_session_id' && e.message !== 'no_auth' && e.message !== 'entitlement_inactive') {
        errLine.style.display = 'block';
        errLine.textContent = e.message || 'Something went wrong.';
        pricingLink.style.display = 'inline-block';
      }
    }
  </script>
</body>
</html>
