<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening app… | IRS Audit Defense Pro</title>
  <meta name="supabase-url" content="%%SUPABASE_URL%%" />
  <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .box { text-align: center; max-width: 420px; padding: 1.5rem; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="box">
    <p id="msg">Checking your account…</p>
    <p id="extra" style="font-size:0.9rem;color:#94a3b8;margin-top:1rem;"></p>
  </div>

  <script type="module">
    import { getSupabase } from '/src/components/Auth.js';

    const msg = document.getElementById('msg');
    const extra = document.getElementById('extra');

    try {
      const supabase = getSupabase();
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = '/pricing';
      } else {
        window.location.replace('/audit-defense.html');
      }
    } catch (e) {
      msg.textContent = 'Something went wrong';
      extra.textContent = e.message || '';
    }
  </script>
</body>
</html>
