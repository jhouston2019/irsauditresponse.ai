<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | IRS Audit Defense Pro</title>
    <meta name="description" content="Sign in to your IRS Audit Defense Pro account.">
    <meta name="supabase-url" content="%%SUPABASE_URL%%">
    <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%">
    <link rel="canonical" href="https://irsauditresponseai.netlify.app/login">
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>IRS Audit Defense Pro</strong></div>
        <div>
            <a href="/pricing" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Pricing</a>
        </div>
    </nav>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <div style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
            <h2 style="text-align:center; margin-bottom:0.5rem; color:#2d3748; font-size:1.8rem;">Log in</h2>
            <p style="text-align:center; color:#64748b; margin-bottom:1.5rem; font-size:0.95rem;">Use the email and password for your account.</p>
            <form id="loginForm">
                <div style="margin-bottom:1.5rem;">
                    <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748; box-sizing:border-box;">
                </div>
                <div style="margin-bottom:1.5rem;">
                    <label for="password" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748; box-sizing:border-box;">
                </div>
                <button type="submit" style="background:#334155; color:white; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; width:100%;">Log in</button>
            </form>
            <p id="msg" style="text-align:center; margin-top:1rem; color:#b91c1c; font-size:0.95rem; min-height:1.2em;"></p>
            <p style="text-align:center; margin-top:1.25rem; font-size:0.95rem;">
                <a href="/pricing" style="color:#1e40af; font-weight:600;">New here? Get access →</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { signInWithPassword, getSupabase } from '/src/components/Auth.js';

        const params = new URLSearchParams(window.location.search);
        const nextRaw = params.get('next');
        const nextPath = nextRaw
          ? (nextRaw.startsWith('/') ? nextRaw : '/' + nextRaw)
          : '/app';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            msg.textContent = '';
            const { error } = await signInWithPassword(email, password);
            if (error) {
                msg.textContent = error.message;
                return;
            }
            const supabase = getSupabase();
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                msg.textContent = 'Could not establish session. Try again.';
                return;
            }
            window.location.href = nextPath;
        });
    </script>
</body>
</html>
