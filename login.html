<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login to Your Account | IRS Audit Defense Pro</title>
    <meta name="description" content="Sign in to your IRS Audit Defense Pro account with a secure email link.">
    <meta name="supabase-url" content="%%SUPABASE_URL%%">
    <meta name="supabase-anon-key" content="%%SUPABASE_ANON_KEY%%">
    <link rel="canonical" href="https://irsauditresponseai.netlify.app/login.html">
</head>
<body style="background:#0f172a; color:#ffffff; font-family:'Inter',sans-serif; margin:0; padding:0; line-height:1.5;">
    <nav style="background:#1e293b; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.1); display:flex; justify-content:space-between; border-bottom: 2px solid #334155;">
        <div style="color: #f5f5f5;"><strong>IRS Audit Defense Pro</strong></div>
        <div>
            <a href="/audit-defense.html" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">IRS Defense</a> |
            <a href="/pricing" style="color: #f5f5f5; text-decoration: none; margin: 0 10px; padding: 8px 16px; border-radius: 4px;">Pricing</a>
        </div>
    </nav>

    <div style="width:min(1120px, 92%); margin-inline:auto; padding:2rem 0;">
        <div style="max-width:500px; margin:2rem auto; padding:2rem; background:#ffffff; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.1); color:#2d3748; border:1px solid #e2e8f0;">
            <h2 style="text-align:center; margin-bottom:0.5rem; color:#2d3748; font-size:1.8rem;">Sign in</h2>
            <p style="text-align:center; color:#64748b; margin-bottom:1.5rem; font-size:0.95rem;">We will email you a secure one-time link (no password).</p>
            <form id="loginForm">
                <div style="margin-bottom:1.5rem;">
                    <label for="email" style="display:block; margin-bottom:0.5rem; font-weight:bold; color:#2d3748;">Email</label>
                    <input type="email" id="email" name="email" required style="width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:10px; font-family:'Inter',sans-serif; font-size:1rem; background:#ffffff; color:#2d3748;">
                </div>
                <button type="submit" style="background:#334155; color:white; padding:14px 28px; border:none; border-radius:10px; cursor:pointer; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600; width:100%;">Email me a login link</button>
            </form>
            <p id="msg" style="text-align:center; margin-top:1rem; color:#2d3748; font-size:0.95rem;"></p>
        </div>
    </div>

    <script type="module">
        import { signInWithMagicLink } from './src/components/Auth.js';

        const params = new URLSearchParams(window.location.search);
        const nextRaw = params.get('next');
        const redirectTo = nextRaw
          ? (nextRaw.startsWith('http') ? nextRaw : `${window.location.origin}${nextRaw.startsWith('/') ? '' : '/'}${nextRaw}`)
          : `${window.location.origin}/app.html`;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('msg');
            msg.textContent = 'Sending link…';
            const { error } = await signInWithMagicLink(email, redirectTo);
            if (error) {
                msg.textContent = error.message;
                return;
            }
            msg.textContent = 'Check your email for the login link.';
        });
    </script>
</body>
</html>
